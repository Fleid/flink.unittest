# Test cases covering common Flink SQL query patterns.
# These patterns represent the most frequently used SQL constructs.
# All tests here use pure SQL logic testable on DuckDB.

tests:

  # ──────────────────────────────────────────────────────────────────
  # Pattern 1: Scan + Filter/Transform (STREAM_SOURCE_SCAN → STREAM_CALC)
  # 1.76M queries -- by far the most common pattern.
  # Simple SELECT with WHERE clause, column transforms, CASE expressions.
  # ──────────────────────────────────────────────────────────────────

  - name: scan_filter_transform
    sql: |
      SELECT
        event_id,
        user_id,
        event_type,
        UPPER(event_type) AS event_type_upper,
        amount * 100 AS amount_cents,
        CASE
          WHEN amount > 1000 THEN 'high'
          WHEN amount > 100  THEN 'medium'
          ELSE 'low'
        END AS tier
      FROM events
      WHERE event_type NOT LIKE 'test'
        AND amount > 0
    given:
      events:
        - {event_id: 1, user_id: 'u1', event_type: 'purchase', amount: 1500.0}
        - {event_id: 2, user_id: 'u2', event_type: 'purchase', amount: 250.0}
        - {event_id: 3, user_id: 'u3', event_type: 'refund',   amount: 50.0}
        - {event_id: 4, user_id: 'u4', event_type: 'test',     amount: 999.0}
        - {event_id: 5, user_id: 'u5', event_type: 'purchase', amount: 0.0}
    expect:
      rows:
        - {event_id: 1, event_type_upper: 'PURCHASE', amount_cents: 150000.0, tier: 'high'}
        - {event_id: 2, event_type_upper: 'PURCHASE', amount_cents: 25000.0,  tier: 'medium'}
        - {event_id: 3, event_type_upper: 'REFUND',   amount_cents: 5000.0,   tier: 'low'}

  # ──────────────────────────────────────────────────────────────────
  # Pattern 2: Lateral Join / CROSS JOIN UNNEST (STREAM_CORRELATE)
  # 120K queries -- flattening arrays/maps, UDTFs.
  # ──────────────────────────────────────────────────────────────────

  - name: lateral_join_unnest
    sql: |
      SELECT
        o.order_id,
        o.customer_id,
        items.item_name,
        items.quantity
      FROM orders o
      CROSS JOIN UNNEST(o.line_items) AS items(item_name, quantity)
    backend: flink
    given:
      orders:
        schema:
          - {name: order_id, type: INT}
          - {name: customer_id, type: INT}
          - {name: line_items, type: "ARRAY<ROW<item_name STRING, quantity INT>>"}
        rows:
          - {order_id: 1, customer_id: 10, line_items: [{item_name: "Widget", quantity: 2}, {item_name: "Gadget", quantity: 1}]}
          - {order_id: 2, customer_id: 11, line_items: [{item_name: "Bolt", quantity: 100}]}
    expect:
      rows:
        - {order_id: 1, customer_id: 10, item_name: 'Widget',  quantity: 2}
        - {order_id: 1, customer_id: 10, item_name: 'Gadget',  quantity: 1}
        - {order_id: 2, customer_id: 11, item_name: 'Bolt',    quantity: 100}

  # ──────────────────────────────────────────────────────────────────
  # Pattern 3: Scan + LIMIT (STREAM_LIMIT)
  # 57K queries -- preview / sampling / debugging.
  # ──────────────────────────────────────────────────────────────────

  - name: scan_with_limit
    sql: |
      SELECT
        sensor_id,
        temperature,
        humidity
      FROM sensor_readings
      WHERE temperature > 30
      LIMIT 3
    given:
      sensor_readings:
        - {sensor_id: 's1', temperature: 35.2, humidity: 60.0}
        - {sensor_id: 's2', temperature: 28.1, humidity: 55.0}
        - {sensor_id: 's3', temperature: 42.0, humidity: 45.0}
        - {sensor_id: 's4', temperature: 31.5, humidity: 70.0}
        - {sensor_id: 's5', temperature: 38.7, humidity: 50.0}
    expect:
      rows:
        - {sensor_id: 's1', temperature: 35.2}
        - {sensor_id: 's3', temperature: 42.0}
        - {sensor_id: 's4', temperature: 31.5}

  # ──────────────────────────────────────────────────────────────────
  # Pattern 4: GROUP BY Aggregate (STREAM_GROUP_AGGREGATE)
  # 40K queries -- counts, sums, avgs grouped by dimension.
  # ──────────────────────────────────────────────────────────────────

  - name: group_by_aggregate_sum_count
    sql: |
      SELECT
        region,
        COUNT(*) AS order_count,
        SUM(amount) AS total_amount,
        AVG(amount) AS avg_amount
      FROM orders
      GROUP BY region
    given:
      orders:
        - {order_id: 1, region: 'US',   amount: 100.0}
        - {order_id: 2, region: 'US',   amount: 200.0}
        - {order_id: 3, region: 'EU',   amount: 150.0}
        - {order_id: 4, region: 'EU',   amount: 350.0}
        - {order_id: 5, region: 'APAC', amount: 500.0}
    expect:
      rows:
        - {region: 'APAC', order_count: 1, total_amount: 500.0, avg_amount: 500.0}
        - {region: 'EU',   order_count: 2, total_amount: 500.0, avg_amount: 250.0}
        - {region: 'US',   order_count: 2, total_amount: 300.0, avg_amount: 150.0}

  - name: group_by_aggregate_min_max
    sql: |
      SELECT
        category,
        MIN(price) AS min_price,
        MAX(price) AS max_price,
        COUNT(DISTINCT seller_id) AS unique_sellers
      FROM products
      GROUP BY category
    given:
      products:
        - {product_id: 1, category: 'Electronics', price: 999.99, seller_id: 's1'}
        - {product_id: 2, category: 'Electronics', price: 49.99,  seller_id: 's2'}
        - {product_id: 3, category: 'Electronics', price: 299.99, seller_id: 's1'}
        - {product_id: 4, category: 'Books',       price: 15.99,  seller_id: 's3'}
        - {product_id: 5, category: 'Books',       price: 29.99,  seller_id: 's3'}
    expect:
      rows:
        - {category: 'Books',       min_price: 15.99, max_price: 29.99, unique_sellers: 1}
        - {category: 'Electronics', min_price: 49.99, max_price: 999.99, unique_sellers: 2}

  # ──────────────────────────────────────────────────────────────────
  # Pattern 5: Regular JOIN (STREAM_JOIN)
  # 19K queries -- enriching a stream with reference data.
  # ──────────────────────────────────────────────────────────────────

  - name: inner_join_enrichment
    sql: |
      SELECT
        o.order_id,
        c.name AS customer_name,
        c.tier AS customer_tier,
        o.amount
      FROM orders o
      JOIN customers c ON o.customer_id = c.customer_id
      WHERE o.status = 'completed'
    given:
      orders:
        - {order_id: 1, customer_id: 100, amount: 250.0, status: 'completed'}
        - {order_id: 2, customer_id: 101, amount: 75.0,  status: 'completed'}
        - {order_id: 3, customer_id: 100, amount: 500.0, status: 'cancelled'}
        - {order_id: 4, customer_id: 102, amount: 120.0, status: 'completed'}
      customers:
        - {customer_id: 100, name: 'Acme Corp',    tier: 'gold'}
        - {customer_id: 101, name: 'Beta Inc',     tier: 'silver'}
        - {customer_id: 102, name: 'Charlie LLC',  tier: 'bronze'}
    expect:
      rows:
        - {order_id: 1, customer_name: 'Acme Corp',   customer_tier: 'gold',   amount: 250.0}
        - {order_id: 2, customer_name: 'Beta Inc',    customer_tier: 'silver', amount: 75.0}
        - {order_id: 4, customer_name: 'Charlie LLC', customer_tier: 'bronze', amount: 120.0}

  - name: left_join_with_nulls
    sql: |
      SELECT
        o.order_id,
        o.amount,
        COALESCE(p.promo_code, 'none') AS promo_code,
        CASE
          WHEN p.discount_pct IS NOT NULL THEN o.amount * (1 - p.discount_pct / 100.0)
          ELSE o.amount
        END AS final_amount
      FROM orders o
      LEFT JOIN promotions p ON o.promo_id = p.promo_id
    given:
      orders:
        - {order_id: 1, amount: 100.0, promo_id: 'P1'}
        - {order_id: 2, amount: 200.0, promo_id: 'P2'}
        - {order_id: 3, amount: 300.0, promo_id: null}
      promotions:
        - {promo_id: 'P1', promo_code: 'SAVE10', discount_pct: 10}
        - {promo_id: 'P2', promo_code: 'SAVE20', discount_pct: 20}
    expect:
      rows:
        - {order_id: 1, promo_code: 'SAVE10', final_amount: 90.0}
        - {order_id: 2, promo_code: 'SAVE20', final_amount: 160.0}
        - {order_id: 3, promo_code: 'none',   final_amount: 300.0}

  # ──────────────────────────────────────────────────────────────────
  # Pattern 6: Multi-JOIN (STREAM_MULTI_JOIN)
  # 8K queries -- joining 3+ tables.
  # ──────────────────────────────────────────────────────────────────

  - name: multi_join_three_tables
    sql: |
      SELECT
        o.order_id,
        c.name AS customer_name,
        p.product_name,
        o.quantity,
        o.quantity * p.unit_price AS line_total
      FROM order_lines o
      JOIN customers c ON o.customer_id = c.customer_id
      JOIN products p ON o.product_id = p.product_id
    given:
      order_lines:
        - {order_id: 1, customer_id: 10, product_id: 'A', quantity: 2}
        - {order_id: 2, customer_id: 11, product_id: 'B', quantity: 5}
        - {order_id: 3, customer_id: 10, product_id: 'B', quantity: 1}
      customers:
        - {customer_id: 10, name: 'Alice'}
        - {customer_id: 11, name: 'Bob'}
      products:
        - {product_id: 'A', product_name: 'Widget', unit_price: 25.0}
        - {product_id: 'B', product_name: 'Gadget', unit_price: 50.0}
    expect:
      rows:
        - {order_id: 1, customer_name: 'Alice', product_name: 'Widget', quantity: 2, line_total: 50.0}
        - {order_id: 2, customer_name: 'Bob',   product_name: 'Gadget', quantity: 5, line_total: 250.0}
        - {order_id: 3, customer_name: 'Alice', product_name: 'Gadget', quantity: 1, line_total: 50.0}

  # ──────────────────────────────────────────────────────────────────
  # Pattern 7: JOIN + GROUP BY (STREAM_JOIN + STREAM_GROUP_AGGREGATE)
  # 3K+ queries -- join then aggregate.
  # ──────────────────────────────────────────────────────────────────

  - name: join_then_group_by
    sql: |
      SELECT
        c.region,
        COUNT(o.order_id) AS total_orders,
        SUM(o.amount) AS total_revenue,
        COUNT(DISTINCT o.customer_id) AS unique_customers
      FROM orders o
      JOIN customers c ON o.customer_id = c.customer_id
      WHERE o.status = 'completed'
      GROUP BY c.region
    given:
      orders:
        - {order_id: 1, customer_id: 10, amount: 100.0, status: 'completed'}
        - {order_id: 2, customer_id: 11, amount: 200.0, status: 'completed'}
        - {order_id: 3, customer_id: 10, amount: 150.0, status: 'completed'}
        - {order_id: 4, customer_id: 12, amount: 300.0, status: 'cancelled'}
        - {order_id: 5, customer_id: 13, amount: 400.0, status: 'completed'}
      customers:
        - {customer_id: 10, region: 'US'}
        - {customer_id: 11, region: 'US'}
        - {customer_id: 12, region: 'EU'}
        - {customer_id: 13, region: 'EU'}
    expect:
      rows:
        - {region: 'EU', total_orders: 1, total_revenue: 400.0, unique_customers: 1}
        - {region: 'US', total_orders: 3, total_revenue: 450.0, unique_customers: 2}

  # ──────────────────────────────────────────────────────────────────
  # Pattern 8: UNION ALL (STREAM_UNION)
  # 3K+ queries -- merging multiple streams.
  # ──────────────────────────────────────────────────────────────────

  - name: union_all_merge_streams
    sql: |
      SELECT source, event_id, amount FROM (
        SELECT 'web' AS source, event_id, amount FROM web_events
        UNION ALL
        SELECT 'mobile' AS source, event_id, amount FROM mobile_events
      )
      WHERE amount > 10
    given:
      web_events:
        - {event_id: 'w1', amount: 50.0}
        - {event_id: 'w2', amount: 5.0}
        - {event_id: 'w3', amount: 120.0}
      mobile_events:
        - {event_id: 'm1', amount: 30.0}
        - {event_id: 'm2', amount: 8.0}
    expect:
      rows:
        - {source: 'mobile', event_id: 'm1', amount: 30.0}
        - {source: 'web',    event_id: 'w1', amount: 50.0}
        - {source: 'web',    event_id: 'w3', amount: 120.0}

  # ──────────────────────────────────────────────────────────────────
  # Pattern 9: DISTINCT / Dedup (often appears as GROUP BY all cols)
  # Common sub-pattern across many query types.
  # ──────────────────────────────────────────────────────────────────

  - name: select_distinct
    sql: |
      SELECT DISTINCT
        category,
        region
      FROM products
    given:
      products:
        - {product_id: 1, category: 'Electronics', region: 'US'}
        - {product_id: 2, category: 'Electronics', region: 'US'}
        - {product_id: 3, category: 'Electronics', region: 'EU'}
        - {product_id: 4, category: 'Books',       region: 'US'}
        - {product_id: 5, category: 'Books',       region: 'US'}
    expect:
      rows:
        - {category: 'Books',       region: 'US'}
        - {category: 'Electronics', region: 'EU'}
        - {category: 'Electronics', region: 'US'}

  # ──────────────────────────────────────────────────────────────────
  # Pattern 10: ORDER BY + LIMIT (STREAM_SORT_LIMIT)
  # 1.5K queries -- top-N with ordering.
  # ──────────────────────────────────────────────────────────────────

  - name: order_by_limit_top_n
    sql: |
      SELECT
        product_id,
        product_name,
        total_sales
      FROM product_summary
      ORDER BY total_sales DESC
      LIMIT 3
    given:
      product_summary:
        - {product_id: 1, product_name: 'Widget A', total_sales: 1500}
        - {product_id: 2, product_name: 'Widget B', total_sales: 3200}
        - {product_id: 3, product_name: 'Widget C', total_sales: 800}
        - {product_id: 4, product_name: 'Widget D', total_sales: 5100}
        - {product_id: 5, product_name: 'Widget E', total_sales: 2300}
    expect:
      ordered: true
      rows:
        - {product_id: 4, product_name: 'Widget D', total_sales: 5100}
        - {product_id: 2, product_name: 'Widget B', total_sales: 3200}
        - {product_id: 5, product_name: 'Widget E', total_sales: 2300}

  # ──────────────────────────────────────────────────────────────────
  # Pattern 11: Subquery with aggregation (common real-world combo)
  # Scan → Aggregate → Filter on aggregate result.
  # ──────────────────────────────────────────────────────────────────

  - name: having_clause_filter
    sql: |
      SELECT
        customer_id,
        COUNT(*) AS order_count,
        SUM(amount) AS total_spent
      FROM orders
      GROUP BY customer_id
      HAVING SUM(amount) > 200
    given:
      orders:
        - {order_id: 1, customer_id: 10, amount: 150.0}
        - {order_id: 2, customer_id: 10, amount: 100.0}
        - {order_id: 3, customer_id: 11, amount: 50.0}
        - {order_id: 4, customer_id: 12, amount: 300.0}
        - {order_id: 5, customer_id: 11, amount: 75.0}
    expect:
      rows:
        - {customer_id: 10, order_count: 2, total_spent: 250.0}
        - {customer_id: 12, order_count: 1, total_spent: 300.0}

  # ──────────────────────────────────────────────────────────────────
  # Pattern 12: Nested CASE + COALESCE + string functions
  # Very common in the CALC node -- real transformation logic.
  # ──────────────────────────────────────────────────────────────────

  - name: complex_transformations
    sql: |
      SELECT
        user_id,
        COALESCE(email, phone, 'unknown') AS contact,
        CASE
          WHEN age < 18 THEN 'minor'
          WHEN age < 30 THEN 'young_adult'
          WHEN age < 60 THEN 'adult'
          ELSE 'senior'
        END AS age_group,
        LOWER(COALESCE(country, 'unknown')) AS country_lower,
        CASE WHEN is_active THEN 'active' ELSE 'inactive' END AS status
      FROM users
    given:
      users:
        - {user_id: 1, email: 'a@b.com', phone: '555-0001', age: 25, country: 'US',   is_active: true}
        - {user_id: 2, email: null,       phone: '555-0002', age: 15, country: 'UK',   is_active: true}
        - {user_id: 3, email: null,       phone: null,       age: 70, country: null,    is_active: false}
        - {user_id: 4, email: 'd@e.com',  phone: null,       age: 45, country: 'DE',   is_active: true}
    expect:
      rows:
        - {user_id: 1, contact: 'a@b.com',  age_group: 'young_adult', country_lower: 'us',      status: 'active'}
        - {user_id: 2, contact: '555-0002', age_group: 'minor',       country_lower: 'uk',      status: 'active'}
        - {user_id: 3, contact: 'unknown',  age_group: 'senior',      country_lower: 'unknown', status: 'inactive'}
        - {user_id: 4, contact: 'd@e.com',  age_group: 'adult',       country_lower: 'de',      status: 'active'}

  # ──────────────────────────────────────────────────────────────────
  # Pattern 13: Multi-level aggregation with GROUP BY
  # GROUP BY with multiple dimensions.
  # ──────────────────────────────────────────────────────────────────

  - name: multi_dimension_group_by
    sql: |
      SELECT
        region,
        product_category,
        COUNT(*) AS sale_count,
        SUM(quantity) AS total_quantity,
        ROUND(AVG(unit_price), 2) AS avg_price
      FROM sales
      GROUP BY region, product_category
    given:
      sales:
        - {sale_id: 1, region: 'US',   product_category: 'Electronics', quantity: 2, unit_price: 299.99}
        - {sale_id: 2, region: 'US',   product_category: 'Electronics', quantity: 1, unit_price: 499.99}
        - {sale_id: 3, region: 'US',   product_category: 'Books',       quantity: 5, unit_price: 14.99}
        - {sale_id: 4, region: 'EU',   product_category: 'Electronics', quantity: 3, unit_price: 349.99}
        - {sale_id: 5, region: 'EU',   product_category: 'Books',       quantity: 2, unit_price: 19.99}
    expect:
      rows:
        - {region: 'EU', product_category: 'Books',       sale_count: 1, total_quantity: 2, avg_price: 19.99}
        - {region: 'EU', product_category: 'Electronics', sale_count: 1, total_quantity: 3, avg_price: 349.99}
        - {region: 'US', product_category: 'Books',       sale_count: 1, total_quantity: 5, avg_price: 14.99}
        - {region: 'US', product_category: 'Electronics', sale_count: 2, total_quantity: 3, avg_price: 399.99}
